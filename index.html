<!DOCTYPE html>
<html>
  <head>
    <base target="_top" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Store Attendance</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f5f7fb;
        margin: 0;
        padding: 0;
      }

      .container {
        max-width: 500px;
        margin: 40px auto;
        background: white;
        padding: 24px;
        border-radius: 12px;
        box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      }

      h2 {
        margin-top: 0;
        margin-bottom: 20px;
        text-align: center;
      }

      label {
        display: block;
        margin-top: 14px;
        margin-bottom: 6px;
        font-weight: bold;
      }

      input, select, button {
        width: 100%;
        padding: 12px;
        border: 1px solid #d0d7de;
        border-radius: 8px;
        box-sizing: border-box;
        font-size: 14px;
      }

      button {
        margin-top: 20px;
        background: #0b57d0;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: bold;
      }

      button:disabled {
        background: #9aa0a6;
        cursor: not-allowed;
      }

      .status {
        margin-top: 16px;
        padding: 12px;
        border-radius: 8px;
        display: none;
        white-space: pre-line;
      }

      .status.info {
        display: block;
        background: #e8f0fe;
        color: #174ea6;
      }

      .status.success {
        display: block;
        background: #e6f4ea;
        color: #137333;
      }

      .status.error {
        display: block;
        background: #fce8e6;
        color: #c5221f;
      }

      .small {
        font-size: 12px;
        color: #666;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Store Attendance</h2>

      <label for="name">Staff Name</label>
      <input type="text" id="name" placeholder="Enter your name" />

      <label for="store">Store</label>
      <select id="store">
        <option value="Chatswood">Chatswood</option>
        <option value="Blacktown">Blacktown</option>
      </select>

      <label for="action">Action</label>
      <select id="action">
        <option value="Check In">Check In</option>
        <option value="Check Out">Check Out</option>
      </select>

      <button id="submitBtn" onclick="submitAttendance()">Submit Attendance</button>

      <div id="status" class="status"></div>

      <div class="small">
        Location access must be enabled to submit attendance.
      </div>
    </div>

    <script>
      let config = {
        allowedRadiusMeters: 200,
        stores: {}
      };

      google.script.run
        .withSuccessHandler(function(result) {
          config = result;
        })
        .withFailureHandler(function(err) {
          showStatus("error", "Failed to load configuration: " + err.message);
        })
        .getConfig();

      function showStatus(type, message) {
        const status = document.getElementById("status");
        status.className = "status " + type;
        status.textContent = message;
      }

      function getCurrentLocation() {
        return new Promise((resolve, reject) => {
          if (!navigator.geolocation) {
            reject(new Error("Geolocation is not supported by your browser."));
            return;
          }

          navigator.geolocation.getCurrentPosition(
            resolve,
            error => {
              reject(new Error(getLocationErrorMessage(error)));
            },
            {
              enableHighAccuracy: true,
              timeout: 15000,
              maximumAge: 0
            }
          );
        });
      }

      function getLocationErrorMessage(error) {
        switch (error.code) {
          case error.PERMISSION_DENIED:
            return "Location permission denied.";
          case error.POSITION_UNAVAILABLE:
            return "Location information is unavailable.";
          case error.TIMEOUT:
            return "Location request timed out.";
          default:
            return "Unknown location error.";
        }
      }

      function calculateDistanceMeters(lat1, lon1, lat2, lon2) {
        const R = 6371000;
        const toRad = deg => deg * Math.PI / 180;

        const dLat = toRad(lat2 - lat1);
        const dLon = toRad(lon2 - lon1);

        const a =
          Math.sin(dLat / 2) * Math.sin(dLat / 2) +
          Math.cos(toRad(lat1)) *
          Math.cos(toRad(lat2)) *
          Math.sin(dLon / 2) * Math.sin(dLon / 2);

        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return R * c;
      }

      async function submitAttendance() {
        const btn = document.getElementById("submitBtn");
        const name = document.getElementById("name").value.trim();
        const store = document.getElementById("store").value;
        const action = document.getElementById("action").value;

        if (!name) {
          showStatus("error", "Please enter your name.");
          return;
        }

        btn.disabled = true;

        try {
          showStatus("info", "Getting your location...");

          const position = await getCurrentLocation();
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          const accuracy = position.coords.accuracy;

          const storeCoords = config.stores[store];
          if (!storeCoords) {
            throw new Error("Store coordinates not found.");
          }

          const distance = calculateDistanceMeters(
            lat,
            lng,
            storeCoords.lat,
            storeCoords.lng
          );

          if (distance > config.allowedRadiusMeters) {
            showStatus(
              "error",
              `You are too far from the store.\nDetected distance: ${Math.round(distance)}m\nAllowed: ${config.allowedRadiusMeters}m`
            );
            btn.disabled = false;
            return;
          }

          const payload = {
            name: name,
            action: action,
            store: store,
            lat: lat,
            lng: lng,
            accuracy: accuracy,
            distance: Math.round(distance),
            device: navigator.userAgent
          };

          showStatus("info", "Submitting attendance...");

          google.script.run
            .withSuccessHandler(function(result) {
              if (result && result.success) {
                showStatus("success", result.message);
                document.getElementById("name").value = "";
              } else {
                showStatus("error", "Submission failed.");
              }
              btn.disabled = false;
            })
            .withFailureHandler(function(err) {
              showStatus("error", "Submission failed: " + err.message);
              btn.disabled = false;
            })
            .saveAttendance(payload);

        } catch (err) {
          showStatus("error", "Unexpected error: " + err.message);
          btn.disabled = false;
        }
      }
    </script>
  </body>
</html>
